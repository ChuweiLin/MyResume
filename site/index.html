<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chuwei Lin Resume</title>
<meta name="description" content="Professional summary, projects, collaborations, education, and publications for Chuwei Lin." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="draft-banner" hidden>This page is a work in progress — draft content below is pending your review.</div>

<div class="wrap">
  <header class="hero">
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#9680;</button>
    <div class="hero-photo">
      <img src="image/headshot.jpeg" alt="Chuwei (Chelsea) Lin" />
    </div>
    <div class="hero-content">
      <h1>Chuwei (Chelsea) Lin</h1>
      <p class="bio" id="bio"></p>
      <div class="links" id="links">
        <a href="mailto:chuwei.lin.phd@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/chuwei-lin-20115" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/ChuweiLin" target="_blank" rel="noopener">GitHub</a>
        <a href="https://orcid.org/0000-0002-8640-5695" target="_blank" rel="noopener">ORCID</a>
      </div>
    </div>
  </header>

  <nav id="section-nav">
    <button class="nav-tab active" type="button" data-target="work">Projects &amp; Collaborations</button>
    <button class="nav-tab" type="button" data-target="education">Education</button>
    <button class="nav-tab" type="button" data-target="publications">Publications</button>
  </nav>

  <section id="work" class="tab-panel active">
    <h2>Projects</h2>
    <div id="projects-list"></div>

    <h2>Collaborations</h2>
    <div id="collaborations-list"></div>
  </section>

  <section id="education" class="tab-panel">
    <h2>Education</h2>
    <div id="education-list"></div>
  </section>

  <section id="publications" class="tab-panel">
    <h2>Publications</h2>

    <h3 class="subsection-title">Citation growth</h3>
    <div class="chart-card">
      <div class="chart-stats">
        <div>
          <div class="stat-value" id="stat-total">&mdash;</div>
          <div class="stat-label">total citations</div>
        </div>
        <div>
          <div class="stat-value" id="stat-latest">&mdash;</div>
          <div class="stat-label">citations in <span id="stat-latest-year"></span></div>
        </div>
      </div>
      <svg id="citation-chart" viewBox="0 0 700 280" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <details id="papers-details">
      <summary class="subsection-title">Full publication list</summary>
      <div id="publications-list"></div>
    </details>
  </section>

  <footer>
    Data from <a href="https://openalex.org" target="_blank" rel="noopener">OpenAlex</a>.
    Source on <a href="https://github.com/ChuweiLin/MyPublications" target="_blank" rel="noopener">GitHub</a>.
  </footer>
</div>

<div id="tooltip"></div>

<div id="lightbox" class="lightbox" hidden>
  <button id="lightbox-close" class="lightbox-close" aria-label="Close">&times;</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script src="app.js"></script>
</body>
</html>
